openapi: "3.0.0"
info:
  version: 1.0.0
  title: quizon server api
paths:
  /list-registrations:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRegistrationsResponse'

components:
  schemas:
    Registration:
      type: object
      required: [number, telegram, team_name, captain_name, phone]
      properties:
        number:
          type: integer
          format: int64
        telegram:
          type: string
        team_id:
          type: string
        team_name:
          type: string
        captain_name:
          type: string
        phone:
          type: string
        group_name:
          type: string
    ListRegistrationsResponse:
      type: array
      items:
        type: array
        $ref: '#/components/schemas/Registration'
